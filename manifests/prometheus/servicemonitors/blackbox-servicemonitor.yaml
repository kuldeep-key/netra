---
# Probe CRDs driving blackbox_exporter from the Prometheus Operator.
#
# Each Probe definition picks targets from
# manifests/blackbox/probes-configmap.yaml. Replace placeholder URLs
# before installing into a real cluster.

# --- Frontend ---------------------------------------------------------
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: netra-blackbox-frontend
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
    release: netra-kps
spec:
  jobName: blackbox-frontend
  interval: 30s
  scrapeTimeout: 10s
  module: http_2xx
  prober:
    url: netra-blackbox-prometheus-blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - https://REPLACE_ME_FRONTEND_HOST_DEV
        - https://REPLACE_ME_FRONTEND_HOST_STAGE
        - https://REPLACE_ME_FRONTEND_HOST_PROD
      labels:
        service: frontend
        team: REPLACE_ME_FRONTEND_TEAM
        probe_kind: health
---
