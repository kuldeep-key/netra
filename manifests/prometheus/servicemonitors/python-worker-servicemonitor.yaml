---
# Placeholder ServiceMonitor for Python worker services.
#
# Workers are expected to expose /metrics on a port named "http-metrics"
# per the integration contract (docs/app-integration.md). Metric wiring
# (queue age, retries, throughput, failure rate) lives in each service.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: netra-python-worker
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
    release: netra-kps
spec:
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: false
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          targetLabel: service
        - sourceLabels: [__meta_kubernetes_pod_label_team]
          targetLabel: team
        - sourceLabels: [__meta_kubernetes_pod_label_environment]
          targetLabel: environment
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_service_label_app_kubernetes_io_component]
          targetLabel: scrape_class
