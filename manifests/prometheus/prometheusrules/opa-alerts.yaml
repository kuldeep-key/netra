---
# OPA alerts.
#
# Series come from OPA's Prometheus exposition (default /metrics).
#   up{job=~".*opa.*"}
#   http_request_duration_seconds_bucket{handler="v1/data", ...}
#   opa_decisions_total{decision="allow|deny|error"}
#   opa_bundle_load_success / opa_bundle_load_duration_seconds
#
# The OPA metrics Service these alerts depend on is provided by any service
# deploying OPA, per the contract (docs/app-integration.md).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: netra-opa-alerts
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
    release: netra-kps
spec:
  groups:
    - name: netra.opa
      interval: 30s
      rules:
        - alert: OpaTargetDown
          expr: |
            up{job=~".*opa.*"} == 0
          for: 5m
          labels:
            severity: critical
            service: opa
            team: platform
          annotations:
            summary: "OPA target down: {{ $labels.instance }} ({{ $labels.environment }})"
            description: "OPA target {{ $labels.instance }} has been down for more than 5 minutes."
            dashboard_url: "https://REPLACE_ME_GRAFANA_HOST/d/netra-opa"
            runbook_url:   "https://REPLACE_ME_REPO_URL/blob/main/runbooks/opa-decision-errors.md"

        - alert: OpaDecisionLatencyHigh
          expr: |
            histogram_quantile(
              0.95,
              sum by (environment, namespace, le, handler) (
                rate(http_request_duration_seconds_bucket{job=~".*opa.*", handler=~"v1/data.*"}[5m])
              )
            ) > 0.05
          for: 10m
          labels:
            severity: warning
            service: opa
            team: platform
          annotations:
            summary: "OPA p95 decision latency > 50ms ({{ $labels.environment }})"
            description: "OPA p95 decision latency on handler {{ $labels.handler }} is above 50ms in {{ $labels.environment }} for 10m."
            dashboard_url: "https://REPLACE_ME_GRAFANA_HOST/d/netra-opa"
            runbook_url:   "https://REPLACE_ME_REPO_URL/blob/main/runbooks/opa-latency-high.md"

        - alert: OpaDecisionErrorRateHigh
          expr: |
            sum by (environment, namespace) (
              rate(opa_decisions_total{decision="error"}[5m])
            )
            /
            sum by (environment, namespace) (
              rate(opa_decisions_total[5m])
            ) > 0.01
          for: 10m
          labels:
            severity: critical
            service: opa
            team: platform
          annotations:
            summary: "OPA decision error rate > 1% ({{ $labels.environment }})"
            description: "OPA decision error rate is above 1% in {{ $labels.environment }} for 10m."
            dashboard_url: "https://REPLACE_ME_GRAFANA_HOST/d/netra-opa"
            runbook_url:   "https://REPLACE_ME_REPO_URL/blob/main/runbooks/opa-decision-errors.md"

        - alert: OpaBundleLoadFailure
          expr: |
            increase(opa_bundle_load_success{success="false"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
            service: opa
            team: platform
          annotations:
            summary: "OPA bundle load failed on {{ $labels.name }} ({{ $labels.environment }})"
            description: "OPA failed to load bundle {{ $labels.name }} in {{ $labels.environment }} within the last 15m."
            dashboard_url: "https://REPLACE_ME_GRAFANA_HOST/d/netra-opa"
            runbook_url:   "https://REPLACE_ME_REPO_URL/blob/main/runbooks/opa-decision-errors.md"
