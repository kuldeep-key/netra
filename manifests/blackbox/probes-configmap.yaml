---
# Blackbox probe target catalog (informational).
#
# Source of truth for probe targets is
# manifests/prometheus/servicemonitors/blackbox-servicemonitor.yaml (the
# Probe CRDs). This ConfigMap is a human-readable mirror so the same
# placeholder URLs can be reviewed in one place.
#
# Replace every REPLACE_ME_ value before installing into a real cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: netra-blackbox-probes-catalog
  namespace: observability
  labels:
    app.kubernetes.io/part-of: netra
data:
  probes.yaml: |
    frontend_health:
      module: http_2xx
      targets:
        dev:   https://REPLACE_ME_FRONTEND_HOST_DEV
        stage: https://REPLACE_ME_FRONTEND_HOST_STAGE
        prod:  https://REPLACE_ME_FRONTEND_HOST_PROD

    api_health:
      module: http_2xx
      targets:
        dev:   https://REPLACE_ME_API_HOST_DEV/health
        stage: https://REPLACE_ME_API_HOST_STAGE/health
        prod:  https://REPLACE_ME_API_HOST_PROD/health

    api_readiness:
      module: http_ready
      targets:
        dev:   https://REPLACE_ME_API_HOST_DEV/ready
        stage: https://REPLACE_ME_API_HOST_STAGE/ready
        prod:  https://REPLACE_ME_API_HOST_PROD/ready

    opa_health:
      module: http_2xx
      targets:
        dev:   http://REPLACE_ME_OPA_HOST_DEV:8181/health
        stage: http://REPLACE_ME_OPA_HOST_STAGE:8181/health
        prod:  http://REPLACE_ME_OPA_HOST_PROD:8181/health
